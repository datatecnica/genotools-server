                    - "1"
                    - "--log-file-path"
                    - "/app/input/new_test_data/syed-res/logs"
                    - "--study-id"
                    - "MAYO"
                    - "KGPAR"                    
                    - "--key-path"
                    - "/app/input/new_test_data/syed_test_idats_n313.txt"
                    - "--fam-path"
                    - "/app/input/new_test_data/syed-res/clinical/merge_by_cohort_10"
                    - "--raw-plink-path"
                    - "/app/input/new_test_data/syed-res/ped_bed"
                    - "--batch-folder-path"
                    - "/app/input/new_test_data/syed-res/batch_files"
                    - "--exec-folder-path"
                    - "/app/input/new_test_data/exec"
                    - "--num-threads"
                    - "6"
                    - "--idat-path"
                    - "/app/input/new_test_data/idats"
                    - "--barcodes-per-job"
                    - "8"
                    - "--codes-per-job"
                    - "80"
                    - "--clinical-key-dir"
                    - ""
                    - "--service-account-name"
                    - "ksa-bucket-access"
                    - "--k8s-namespace"
                    - "kns-gtserver"
                    - "--pv-claim"
                    - "gtserver-pvc"
                    - "--gke-nodepools"
                    - "workflow-idat-ped-bed-nodepool"

                  volumeMounts:
                  - name: gcs-volume
                    mountPath: /app/input
                    readOnly: false
                volumes:
                - name: gcs-volume
                  persistentVolumeClaim:
                    claimName: gtserver-pvc #gtserver-test-pvc
                    readOnly: false
            activeDeadlineSeconds: 18000 # Terminate if running for more than 5 hours
            ttlSecondsAfterFinished: 300 # Clean up 5 minutes after completion        
            backoffLimit: 2
      # Capture the generated job name as an output parameter
      outputs:
        parameters:
          - name: jobName
            valueFrom:
              jsonPath: "{.metadata.name}"
          - name: jobSucceeded
            valueFrom:
              jsonPath: "{.status.succeeded}"
          - name: jobStatusFull
            valueFrom:
              jsonPath: "{ .status }"

    - name: deploy-idat-ped-jobs
      serviceAccountName: "ksa-bucket-access"
      metadata:
        annotations:
          gke-gcsfuse/volumes: "true" 
      script:
        image: google/cloud-sdk:slim #bitnami/kubectl:latest
        volumeMounts:
          - name: workdir
            mountPath: /app/input #/tmp/workdir2
            readOnly: false
        command: [sh]
        source: |
          apt-get install kubectl
          #FILES=$(ls  || echo "")
          FILES=$(ls /app/input/new_test_data/syed-res/batch_files/idat_ped/job_idat_ped*.yaml)
          echo Got files $FILES
          for item in $FILES; do
            echo "Processing: $item"
            cp $item ./job.yaml
            # cat job.yaml
            #Inject workflow label for tracking
            cat job.yaml | \
            kubectl label -f - --local -o yaml workflow={{workflow.name}} | \
            kubectl apply -f -
            # Extract Job name (if using generateName, get generated name)
            JOB_NAME=$(kubectl get -f job.yaml -o jsonpath='{.metadata.name}')
            if [ -z "$JOB_NAME" ]; then
              # It uses generateName — get last created Job
              sleep 2
              JOB_NAME=$(kubectl get job --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1:].metadata.name}')
            fi
            echo "JOB_NAME=$JOB_NAME"
          done
      volumes:
        - name: workdir
          persistentVolumeClaim:
            claimName: gtserver-pvc #gtserver-pvc #gtserver-test-pvc #gcs-pvc
            readOnly: false
